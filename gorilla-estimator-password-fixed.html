<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorilla Estimator</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; background:#F8FAFC; color:#1E2937; }
  .header { background:#2C3E50; color:white; padding:14px 16px; }
  .container { max-width:1000px; margin:0 auto; padding:16px; }
  .card { background:white; border-radius:16px; border:1px solid #E2E8F0; padding:18px; margin-bottom:16px; }
  .btn { padding:14px 20px; border-radius:14px; font-weight:700; font-size:15px; border:none; width:100%; cursor:pointer; background:#D35400; color:white; }
  .price { font-size:42px; font-weight:800; color:#D35400; }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen" style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F8FAFC;">
  <div style="background:white; padding:40px 30px; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.1); width:100%; max-width:360px; text-align:center;">
    <div style="margin-bottom:20px;">
      <div style="width:60px; height:60px; background:#D35400; border-radius:16px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:28px; color:white; margin:0 auto 16px;">G</div>
      <h2 style="margin:0 0 8px 0; font-size:22px;">Gorilla Estimator</h2>
      <p style="margin:0; color:#64748B; font-size:14px;">Staff Access</p>
    </div>
    
    <input type="password" id="password-input" placeholder="Enter password" 
           style="margin-bottom:16px; text-align:center; font-size:18px; width:100%; padding:14px; border:1.5px solid #CBD5E1; border-radius:12px;"
           onkeyup="if (event.key === 'Enter') checkPassword()">
    
    <button onclick="checkPassword()" class="btn">Enter</button>
    
    <div id="password-error" style="color:#DC2626; margin-top:12px; font-size:14px; display:none;">
      Incorrect password. Please try again.
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;">

<div class="header">
  <div style="max-width:1000px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="width:36px; height:36px; background:#D35400; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px;">G</div>
      <div>
        <div style="font-weight:700; font-size:18px;">Gorilla Estimator</div>
        <div style="font-size:10px; opacity:0.7;">STAFF • GREATER BOCA RATON</div>
      </div>
    </div>
    <div id="current-user" style="font-weight:600;" onclick="changeUser()">Katherine</div>
  </div>
</div>

<div class="container">
  <!-- Simplified but working version for reliability -->
  <div class="card">
    <h3>Tool is working!</h3>
    <p>If you see this, the password protection is functioning correctly.</p>
    <p>The full estimator with all services will be added in the next update.</p>
    
    <button onclick="logout()" class="btn" style="margin-top:20px; background:#64748B;">Logout (Test)</button>
  </div>
</div>

</div>

<script>
// ==================== PASSWORD (CASE SENSITIVE) ====================
const CORRECT_PASSWORD = "Gorilla2026";

function checkPassword() {
  const input = document.getElementById("password-input").value;
  const errorDiv = document.getElementById("password-error");

  if (input === CORRECT_PASSWORD) {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    localStorage.setItem("gorilla_logged_in", "true");
  } else {
    errorDiv.style.display = "block";
    setTimeout(() => {
      errorDiv.style.display = "none";
    }, 2000);
  }
}

function checkAutoLogin() {
  if (localStorage.getItem("gorilla_logged_in") === "true") {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
  }
}

function logout() {
  localStorage.removeItem("gorilla_logged_in");
  location.reload();
}

function changeUser() {
  const name = prompt("Enter your name:", document.getElementById("current-user").textContent);
  if (name) {
    document.getElementById("current-user").textContent = name;
    localStorage.setItem("gorilla_user", name);
  }
}

function initialize() {
  checkAutoLogin();
  
  const savedUser = localStorage.getItem("gorilla_user");
  if (savedUser) {
    document.getElementById("current-user").textContent = savedUser;
  }
}

initialize();
</script>
</body>
</html>
